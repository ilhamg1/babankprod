# cloudbuild.yaml
# Foundation for the Babank CI Pipeline

steps:
  # Step 1: Baseline initialization to verify execution environment
  - name: 'ubuntu'
    id: 'Initialization'
    args: ['echo', 'Foundational Cloud Build Pipeline initialized successfully.']

  # Step 2: Run Go Static Analysis (golangci-lint)
  - name: 'golangci/golangci-lint:v1.59.0'
    id: 'Go Lint'
    args: ['golangci-lint', 'run', './...']

  # Step 3: Run Angular ESLint
  - name: 'node:20'
    id: 'Angular Dependencies'
    dir: 'apps/web'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:20'
    id: 'Angular Lint'
    dir: 'apps/web'
    entrypoint: 'npx'
    args: ['ng', 'lint']

  # Step 4: Run all Bazel tests and generate coverage across the monorepo
  - name: 'gcr.io/cloud-builders/bazel'
    id: 'Bazel Test & Coverage'
    args: ['coverage', '--remote_cache=https://storage.googleapis.com/babankprod-bazel-cache', '//...']

# Publish Test Coverage Reports as Artifacts
artifacts:
  objects:
    location: 'gs://babankprod-bazel-cache/coverage-reports/$BUILD_ID'
    paths:
      - 'bazel-testlogs/**/coverage.dat'

# Global Build Options
options:
  # Use a larger machine type for Bazel builds
  machineType: 'E2_HIGHCPU_8'
  # Stream logs directly to Google Cloud Logging
  logging: CLOUD_LOGGING_ONLY

# Build Timeout (1 hour)
timeout: 3600s
